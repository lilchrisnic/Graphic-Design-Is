<!DOCTYPE html>
<html>
<head>
    <title>Graphic Design is...</title>
    <style>

body {

    font-family: Arial, sans-serif;
    font-size: 3rem;
    text-align: center;
    margin-top: 20vh;
}
#word {
    font-family: Arial, sans-serif;
    font-weight: bold;
     font-size: 6rem;
}
</style>
</head>
<body>

<div>
    Graphic Design is... <br> <span id="word"></span>
</div>

<script>
const words = [

"Heart Surgery.",
"Apollo II.",
"White Chocolate Tim Tams.",
"The Atom Bomb.",
"Kim Kardashian.",
"Blood Glucose Monitoring.",
"Large Hadron Collider.",
"Bitcoin.",
"iPhone 3Gs.",
"The Pink Zooper Dooper.",
"Myki Fines.",
"Quantum Computing",
"Chemotherapy",
"BBQ Shapes",
"The Holy Bible",
"Coburg Station",
"Gmail",
"Science Fiction",
"Religious Iconography",
"Female Toilets",
"Mathematics",
"Long Division",
"Filing Cabinets",
"Athletics Carnivals",
"A Spiderman Halloween Costume",
"IKEA Furniture (Assembled)",
"Free Wi-Fi",
"Janitor’s Closet",
"Loyalty Programs",
"Terms and Conditions",
"Family Recipes",
"Express Shipping",
"Piano Lessons",
"Facial Recognition",
"Sexting",
"Shampoo / Conditioner",
"Lunch Time",
"Death by Anaphylactic Shock (Accidental)",
"Justin Bieber Under the Mistletoe (Deluxe Edition CD)",
"The Moon Landing",
"Miami",
"Intermittent Fasting",
"Adult Diapers",
"Microsoft",
"Life",
"Death",
"Lab-Grown Diamonds",
"NFTs",
"Big Pharmaceuticals",
"Social Distancing",
"Divorce"
];

const wordElement = document.getElementById("word");

let lastIndex = -1;

function updateWord() {

    let index;

    do {

        index = Math.floor(Math.random() * words.length);

    } while (index === lastIndex);

    lastIndex = index;

    wordElement.textContent = words[index];

}
updateWord();
setInterval(updateWord, 1000); // change every 3 seconds
</script>

</body>
</html>
