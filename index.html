<!DOCTYPE html>
<html>
<head>
    <title>Graphic Design is...</title>
    <style>

body {

    font-family: Arial, sans-serif;
    font-size: 3rem;
    text-align: center;
    margin-top: 20vh;
}
#word {
    font-family: Arial, sans-serif;
    font-style: bold;
}
</style>
</head>
<body>

<div>
    Graphic Design is... <br> <span id="word"></span>
</div>

<script>
const words = [
    "Kim Kardashian.",
    "The Atom Bomb.",
    "Blood Glucose Monitoring.",
    "The Holy Bible."
];

const wordElement = document.getElementById("word");

function updateWord() {
    const randomWord = words[Math.floor(Math.random() * words.length)];
    wordElement.textContent = randomWord;
}

updateWord();
setInterval(updateWord, 2000); // change every 3 seconds
</script>

</body>
</html>
