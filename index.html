<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphic Design is...</title>

<style>
    body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
        background: white;
        font-family: Arial, sans-serif;
    }

    /* Center title */
    #title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);

        font-size: 30px;
        font-weight: normal;
        text-align: center;

        z-index: 1000;
        pointer-events: none;
    }

    /* Random subjects */
    .word {
        position: absolute;
        font-size: 50px;
        font-weight: bold;
        white-space: nowrap;
        color: black;
        pointer-events: none;
    }
</style>
</head>

<body>

<div id="title">Graphic Design is...</div>

<script>
const words = [
    "Heart Surgery.",
    "Apollo II.",
    "White Chocolate Tim Tams.",
    "The Atom Bomb.",
    "Kim Kardashian.",
    "Blood Glucose Monitoring.",
    "Large Hadron Collider.",
    "Bitcoin.",
    "iPhone 3Gs.",
    "The Pink Zooper Dooper.",
    "Myki Fines.",
    "Quantum Computing.",
    "Chemotherapy.",
    "BBQ Shapes.",
    "The Holy Bible.",
    "Coburg Station.",
    "Science Fiction.",
    "Religious Iconography.",
    "Female Toilets.",
    "Mathematics.",
    "Long Division.",
    "Filing Cabinets.",
    "Athletics Carnivals.",
    "A Spiderman Halloween Costume.",
    "IKEA Furniture (Assembled).",
    "Free Wi-Fi.",
    "Janitors Closet.",
    "Loyalty Programs.",
    "Terms and Conditions.",
    "Family Recipes.",
    "Express Shipping.",
    "Piano Lessons.",
    "Facial Recognition.",
    "Sexting.",
    "Shampoo / Conditioner.",
    "Lunch Time.",
    "Death by Anaphylactic Shock (Accidental).",
    "Justin Bieber Under the Mistletoe (Deluxe Edition CD).",
    "The Moon Landing.",
    "Miami.",
    "Intermittent Fasting.",
    "Adult Diapers.",
    "Microsoft.",
    "Life.",
    "Death.",
    "Lab-Grown Diamonds.",
    "NFTs.",
    "Big Pharmaceuticals.",
    "Social Distancing.",
    "Divorce.",
    "Decaf.",
    "No Parking Zone.",
    "Edible Flowers.",
    "Medical Marijuana.",
    "The Perm.",
    "Waffles, instead of Pancakes.",
    "The 2003 Iraq War."
];

let currentIndex = 0;

function addWord() {
    const word = document.createElement("div");
    word.className = "word";
    word.textContent = words[currentIndex];

    let x, y;

    // Keep words away from the center title
    do {
        x = Math.random() * (window.innerWidth - 300);
        y = Math.random() * (window.innerHeight - 80);
    } while (
        x > window.innerWidth / 2 - 300 &&
        x < window.innerWidth / 2 + 300 &&
        y > window.innerHeight / 2 - 120 &&
        y < window.innerHeight / 2 + 120
    );

    word.style.left = `${x}px`;
    word.style.top = `${y}px`;

    document.body.appendChild(word);

    currentIndex = (currentIndex + 1) % words.length;
}

// Add first word immediately
addWord();

// Add a new word every second
setInterval(addWord, 1000);
</script>

</body>
</html>
